stages:
  - test
  - build
  - deploy

variables:
  BE_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  FE_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA

# ── TEST ────────────────────────────────────────────────

test-go:
  stage: test
  image: golang:1.22
  script:
    - cd backend && go test ./...

test-frontend:
  stage: test
  image: node:20
  script:
    - cd frontend && npm ci && npm run lint

# ── BUILD ───────────────────────────────────────────────

build-go:
  stage: build
  image: docker:24
  services: [docker:dind]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $BE_IMAGE ./backend
    - docker push $BE_IMAGE
  only: [main]

build-frontend:
  stage: build
  image: docker:24
  services: [docker:dind]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $FE_IMAGE ./frontend
    - docker push $FE_IMAGE
  only: [main]

# ── DEPLOY ──────────────────────────────────────────────

deploy:
  stage: deploy
  image: alpine
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
  script:
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $BE_IMAGE &&
        docker pull $FE_IMAGE &&
        BE_IMAGE=$BE_IMAGE FE_IMAGE=$FE_IMAGE docker compose up -d --no-build
      "
  only: [main]