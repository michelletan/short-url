services:
  db:
    image: postgres:15
    env_file:
      - .env.ci
    container_name: shorturl-db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - .env.ci
    container_name: shorturl-backend
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    env_file:
      - .env.ci
    container_name: shorturl-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: always

volumes:
  db_data:
    driver: local